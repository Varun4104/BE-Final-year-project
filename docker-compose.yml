version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: varun-db
    environment:
      POSTGRES_USER: varun
      POSTGRES_PASSWORD: password
      POSTGRES_DB: research_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: varun-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
    environment:
      - DATABASE_URL=postgresql+asyncpg://varun:password@db:5432/research_db
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: varun-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
